name: Build and release packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Job 1: Build .deb on Ubuntu ─────────────────────────────────────────
  build-deb:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.make_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make dpkg-dev

      - name: Read VERSION from Makefile
        id: version
        shell: bash
        run: |
          MAKE_VERSION="$(grep -E '^[[:space:]]*VERSION[[:space:]]*:=' Makefile | head -n1 | sed -E 's/^[^:]*:=[[:space:]]*//')"
          if [[ -z "$MAKE_VERSION" ]]; then
            echo "Could not parse VERSION from Makefile"
            exit 1
          fi
          echo "make_version=$MAKE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Makefile VERSION: $MAKE_VERSION"

      - name: Validate tag matches Makefile VERSION
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MAKE_VERSION="${{ steps.version.outputs.make_version }}"
          if [[ "$TAG" != "$MAKE_VERSION" ]]; then
            echo "Version mismatch: tag v$TAG != Makefile VERSION $MAKE_VERSION"
            exit 1
          fi

      - name: Build .deb
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: "*.deb"
          if-no-files-found: error

  # ── Job 2: Build .rpm in Fedora container ───────────────────────────────
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
      - name: Install build dependencies
        run: dnf install -y make rpm-build git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .rpm
        run: make rpm

      - name: Collect .rpm
        run: |
          mkdir -p dist
          find "$HOME/rpmbuild/RPMS" -type f -name "*.rpm" -exec cp -v {} dist/ \;
          ls -lah dist/

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: dist/*.rpm
          if-no-files-found: error

  # ── Job 3: Publish release ───────────────────────────────────────────────
  release:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest

    steps:
      - name: Download .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: dist/

      - name: Download .rpm
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: dist/

      - name: Compute checksums
        run: |
          sha256sum dist/* > sha256sums.txt
          cat sha256sums.txt

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtu-sustain-setup-packages-${{ needs.build-deb.outputs.version }}
          path: |
            dist/
            sha256sums.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: DTU Linux Setup v${{ needs.build-deb.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*
            sha256sums.txt
          generate_release_notes: true